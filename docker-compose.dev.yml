services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: reelix-bot-dev
    env_file:
      - .env.dev
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: reelix-mongo-dev
    ports:
      - '27017:27017'
    volumes:
      - mongo-data-dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mongo-data-dev:

networks:
  app-network:
