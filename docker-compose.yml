services:
  bot:
    build: .
    container_name: reelix-movie-assistant-bot
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy   
    networks:
      - app-network
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: reelix-mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - '27017:27017'              
    volumes:
      - mongo-data:/data/db        
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mongo-data:                      

networks:
  app-network:
